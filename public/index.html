<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>kintone 一覧</title>
</head>
<body>
  <h1>kintone レコード一覧</h1>
  <table border="1" id="records-table">
    <thead>
      <tr>
        <th>レコード番号</th>
        <th>メーカー</th>
        <th>車種</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function loadRecords() {
      const res = await fetch("/api/kintone");
      const data = await res.json();

      const tbody = document.querySelector("#records-table tbody");
      tbody.innerHTML = "";

      data.records.forEach(r => {
        const values = [r.$id.value, r.brand?.value ?? "", r.model?.value ?? ""];

        const tr = document.createElement("tr");
        tr.append(...values.map(value => {
          const td = document.createElement("td");
          td.textContent = value;
          return td;
        }));
        tbody.appendChild(tr);
      });
    }

    loadRecords();
  </script>
</body>
</html>
